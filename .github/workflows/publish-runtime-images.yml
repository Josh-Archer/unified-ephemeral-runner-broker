name: Publish Runtime Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Runtime image tag to publish.
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: cloud-run
            package: uecb-cloud-run
            dockerfile: Dockerfile.cloud-run
          - name: lambda
            package: uecb-lambda
            dockerfile: Dockerfile.lambda
          - name: azure-functions
            package: uecb-azure-functions
            dockerfile: Dockerfile.azure-functions
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          outputs: type=image,push=true,oci-mediatypes=false
          tags: ghcr.io/josh-archer/${{ matrix.image.package }}:${{ inputs.tag }}

      - name: Verify Lambda-compatible image manifest
        if: ${{ matrix.image.name == 'lambda' }}
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/josh-archer/${{ matrix.image.package }}:${{ inputs.tag }}"
          raw="$(docker buildx imagetools inspect --raw "${image}")"
          media_type="$(printf '%s' "${raw}" | jq -r '.mediaType')"

          if [ "${media_type}" != "application/vnd.docker.distribution.manifest.v2+json" ]; then
            echo "Invalid Lambda manifest media type: ${media_type}" >&2
            printf '%s\n' "${raw}" >&2
            exit 1
          fi

          if printf '%s' "${raw}" | jq -e 'has("manifests")' >/dev/null; then
            echo "Unexpected multi-manifest payload for Lambda image." >&2
            printf '%s\n' "${raw}" >&2
            exit 1
          fi
