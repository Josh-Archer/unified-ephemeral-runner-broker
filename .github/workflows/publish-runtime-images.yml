name: Publish Runtime Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Runtime image tag to publish.
        required: true
        type: string

# Least privilege for GHCR publish + Sigstore OIDC attestations.
# provenance/sbom stay disabled on build-push so the Lambda image remains a
# single Docker v2 manifest; attestations are published separately and bound
# to the pushed digest (GitHub Attestations API + optional registry referrers).
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: josh-archer
  # Pin Syft via anchore/sbom-action so SBOM generation is reproducible.
  SYFT_VERSION: v1.48.0

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: cloud-run
            package: uecb-cloud-run
            dockerfile: Dockerfile.cloud-run
          - name: lambda
            package: uecb-lambda
            dockerfile: Dockerfile.lambda
          - name: azure-functions
            package: uecb-azure-functions
            dockerfile: Dockerfile.azure-functions
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Keep provenance/sbom false and oci-mediatypes=false so the primary
      # image stays application/vnd.docker.distribution.manifest.v2+json
      # (required by AWS Lambda). Attestations are attached by digest later
      # and must not rewrite this subject manifest.
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          outputs: type=image,push=true,oci-mediatypes=false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image.package }}:${{ inputs.tag }}

      - name: Capture image identity
        id: image
        shell: bash
        run: |
          set -euo pipefail
          name="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image.package }}"
          digest="${{ steps.build.outputs.digest }}"
          if [[ -z "${digest}" || "${digest}" != sha256:* ]]; then
            echo "Missing or invalid build digest: '${digest}'" >&2
            exit 1
          fi
          echo "name=${name}" >> "${GITHUB_OUTPUT}"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "ref=${name}@${digest}" >> "${GITHUB_OUTPUT}"
          echo "tag_ref=${name}:${{ inputs.tag }}" >> "${GITHUB_OUTPUT}"

      - name: Verify Lambda-compatible image manifest
        if: ${{ matrix.image.name == 'lambda' }}
        shell: bash
        run: |
          set -euo pipefail

          image="${{ steps.image.outputs.tag_ref }}"
          raw="$(docker buildx imagetools inspect --raw "${image}")"
          media_type="$(printf '%s' "${raw}" | jq -r '.mediaType')"

          if [ "${media_type}" != "application/vnd.docker.distribution.manifest.v2+json" ]; then
            echo "Invalid Lambda manifest media type: ${media_type}" >&2
            printf '%s\n' "${raw}" >&2
            exit 1
          fi

          if printf '%s' "${raw}" | jq -e 'has("manifests")' >/dev/null; then
            echo "Unexpected multi-manifest payload for Lambda image." >&2
            printf '%s\n' "${raw}" >&2
            exit 1
          fi

      - name: Generate SPDX SBOM for image
        id: sbom
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ steps.image.outputs.ref }}
          format: spdx-json
          artifact-name: ${{ matrix.image.package }}-${{ inputs.tag }}.spdx.json
          output-file: ${{ runner.temp }}/${{ matrix.image.package }}.spdx.json
          upload-release-assets: false
          syft-version: ${{ env.SYFT_VERSION }}

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          # Registry referrers do not rewrite the subject Docker v2 manifest.
          push-to-registry: true
          # Storage records require org-owned repos; keep least-privilege.
          create-storage-record: false

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.image.outputs.digest }}
          sbom-path: ${{ runner.temp }}/${{ matrix.image.package }}.spdx.json
          push-to-registry: true
          create-storage-record: false

      # Re-check after registry referrer attach so Lambda stays single-manifest.
      - name: Re-verify Lambda manifest after attestations
        if: ${{ matrix.image.name == 'lambda' }}
        shell: bash
        run: |
          set -euo pipefail

          image="${{ steps.image.outputs.tag_ref }}"
          expected="${{ steps.image.outputs.digest }}"
          raw="$(docker buildx imagetools inspect --raw "${image}")"
          media_type="$(printf '%s' "${raw}" | jq -r '.mediaType')"

          if [ "${media_type}" != "application/vnd.docker.distribution.manifest.v2+json" ]; then
            echo "Lambda manifest media type changed after attestations: ${media_type}" >&2
            printf '%s\n' "${raw}" >&2
            exit 1
          fi

          if printf '%s' "${raw}" | jq -e 'has("manifests")' >/dev/null; then
            echo "Lambda image became multi-manifest after attestations." >&2
            printf '%s\n' "${raw}" >&2
            exit 1
          fi

          # Subject digest is the sha256 of the raw manifest bytes.
          digest="sha256:$(printf '%s' "${raw}" | sha256sum | awk '{print $1}')"
          if [ "${digest}" != "${expected}" ]; then
            echo "Lambda tag digest drifted after attestations: got ${digest}, expected ${expected}" >&2
            exit 1
          fi
