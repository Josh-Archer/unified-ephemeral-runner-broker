name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test ./...

      - name: Broker config sanity
        run: |
          test -f charts/unified-ephemeral-runner-broker/Chart.yaml
          test -f actions/allocate-runner/action.yml
          test -f examples/gitops/kustomize/base/kustomization.yaml

      - name: Manifest render sanity
        run: |
          helm template uecb charts/unified-ephemeral-runner-broker >/tmp/uecb-helm.yaml
          kubectl kustomize examples/gitops/kustomize/base >/tmp/uecb-kustomize.yaml

      - name: Render GitOps pack variants
        run: ./scripts/validate-gitops-packs.sh

  api-docs-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: API docs and action contract check
        run: bash scripts/check-api-docs-contract.sh
  warm-pool-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Warm pool regression tests
        run: |
          go test ./internal/api \
            -run "TestAllocatePrefersWarmAllocationOverColdLaunch|TestReconcileWarmPoolsCreatesWarmAllocation|TestReconcileWarmPoolsRecyclesExpiredWarmAllocation" \
            -count=1

          go test ./internal/backend/externaldispatch \
            -run "TestProvisionPassesLaunchModeFromAllocationMetadata" \
            -count=1

  backend-admission-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Backend circuit and rate-limit regression tests
        run: |
          go test ./internal/api ./internal/backend/externaldispatch ./internal/scheduler \
            -run "Test.*Circuit|Test.*Breaker|Test.*Probe|Test.*Timeout|Test.*RateLimit" \
            -count=1

  adapter-sdk-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Adapter SDK conformance tests
        run: |
          go test ./pkg/... ./examples/adapter/... -count=1

  durable-state-queue-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Durable state and queue regression tests
        run: |
          go test ./internal/api ./internal/config ./internal/store \
            -run "Test.*FileStore|Test.*Queue|Test.*Queued|Test.*StateStore" \
            -count=1

  tier-routing-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Tier routing regression tests
        run: |
          go test ./internal/tier/... -count=1

          go test ./internal/api ./internal/config ./internal/runtime \
            -run "Test.*Tier" \
            -count=1

  action-queue-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start mock broker
        run: |
          cat <<'EOF' > mock-broker.py
          from http.server import HTTPServer, BaseHTTPRequestHandler
          
          class MockBroker(BaseHTTPRequestHandler):
              call_count = 0
              def do_POST(self):
                  self.send_response(202)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(b'{"state": "pending", "allocation_id": "alloc-123", "retry_after": "2024-01-01T00:00:00Z"}')

              def do_GET(self):
                  MockBroker.call_count += 1
                  if MockBroker.call_count < 2:
                      self.send_response(202)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(b'{"state": "pending", "allocation_id": "alloc-123", "retry_after": "2024-01-01T00:00:00Z"}')
                  else:
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      self.wfile.write(b'{"state": "ready", "allocation_id": "alloc-123", "runner_label": "lbl-456", "selected_backend": "arc", "expires_at": "2025"}')
          
          HTTPServer(("127.0.0.1", 8080), MockBroker).serve_forever()
          EOF
          python3 mock-broker.py &
          # Give it a second to start
          sleep 1

      - name: Test allocate-runner action
        id: allocate
        uses: ./actions/allocate-runner
        with:
          broker_url: http://127.0.0.1:8080
          pool: test-pool
          allow_unauthenticated: "true"

      - name: Verify outputs
        run: |
          if [ "${{ steps.allocate.outputs.allocation_id }}" != "alloc-123" ]; then
            echo "Expected alloc-123, got ${{ steps.allocate.outputs.allocation_id }}"
            exit 1
          fi
          if [ "${{ steps.allocate.outputs.runner_label }}" != "lbl-456" ]; then
            echo "Expected lbl-456, got ${{ steps.allocate.outputs.runner_label }}"
            exit 1
          fi

