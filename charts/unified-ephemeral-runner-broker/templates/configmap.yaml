apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uecb.fullname" . }}-config
data:
  broker.yaml: |
    github:
      auth:
        mode: {{ .Values.config.github.auth.mode }}
        secretRef: {{ .Values.config.github.auth.secretRef }}
      scope:
        type: {{ .Values.config.github.scope.type }}
        organization: {{ .Values.config.github.scope.organization }}
        runnerGroupPrefix: {{ .Values.config.github.scope.runnerGroupPrefix }}
    broker:
      defaultPool: {{ .Values.config.broker.defaultPool }}
      defaultJobTimeout: {{ .Values.config.broker.defaultJobTimeout }}
      orphanCleanup:
        enabled: {{ .Values.config.broker.orphanCleanup.enabled }}
        quarantineTTL: {{ .Values.config.broker.orphanCleanup.quarantineTTL }}
      stateStore:
        type: {{ .Values.config.broker.stateStore.type }}
        {{- if .Values.config.broker.stateStore.path }}
        path: {{ .Values.config.broker.stateStore.path }}
        {{- end }}
      queue:
        enabled: {{ .Values.config.broker.queue.enabled }}
        retryAfter: {{ .Values.config.broker.queue.retryAfter }}
        maxAttempts: {{ .Values.config.broker.queue.maxAttempts }}
      allowUnauthenticated: {{ .Values.config.allowUnauthenticated }}
      api:
        oidcAudience: {{ .Values.config.broker.api.oidcAudience }}
        oidcPolicy:
{{ toYaml (.Values.config.broker.api.oidcPolicy | default dict) | indent 10 }}
      tierRouting:
{{ toYaml .Values.config.broker.tierRouting | indent 8 }}
    pools:
{{ toYaml .Values.config.pools | indent 6 }}
