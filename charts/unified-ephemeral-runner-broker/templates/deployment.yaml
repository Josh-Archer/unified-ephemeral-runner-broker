{{- $storeType := default "memory" .Values.config.broker.stateStore.type }}
{{- if and (gt (int .Values.replicaCount) 1) (ne $storeType "postgres") }}
{{- fail (printf "replicaCount=%v is unsafe with process-local stateStore.type %q; set config.broker.stateStore.type=postgres for multi-replica HA, or set replicaCount=1" .Values.replicaCount $storeType) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uecb.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "uecb.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "uecb.name" . }}
{{- with .Values.podLabels }}
{{ toYaml . | indent 8 }}
{{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
{{- with .Values.podAnnotations }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ include "uecb.serviceAccountName" . }}
      containers:
        - name: broker
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: UECB_CONFIG_PATH
              value: /etc/uecb/broker.yaml
            - name: UECB_REPLICAS
              value: {{ .Values.replicaCount | quote }}
            - name: UECB_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: UECB_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
{{- if and (eq $storeType "postgres") .Values.config.broker.stateStore.secretRef }}
            - name: {{ default "UECB_STATE_STORE_DSN" .Values.config.broker.stateStore.dsnEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.broker.stateStore.secretRef }}
                  key: {{ default "dsn" .Values.config.broker.stateStore.secretKey }}
{{- end }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/uecb
{{- if .Values.config.github.auth.secretRef }}
            - name: github-app-secret
              mountPath: /etc/uecb/github-app
              readOnly: true
{{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "uecb.fullname" . }}-config
{{- if .Values.config.github.auth.secretRef }}
        - name: github-app-secret
          secret:
            secretName: {{ .Values.config.github.auth.secretRef }}
{{- end }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
