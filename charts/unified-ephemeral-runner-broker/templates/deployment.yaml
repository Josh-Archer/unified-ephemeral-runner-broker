apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uecb.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "uecb.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "uecb.name" . }}
{{ toYaml .Values.podLabels | indent 8 }}
      annotations:
{{ toYaml .Values.podAnnotations | indent 8 }}
    spec:
      serviceAccountName: {{ include "uecb.serviceAccountName" . }}
      containers:
        - name: broker
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: UECB_CONFIG_PATH
              value: /etc/uecb/broker.yaml
            - name: UECB_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/uecb
{{- if .Values.config.github.auth.secretRef }}
            - name: github-app-secret
              mountPath: /etc/uecb/github-app
              readOnly: true
{{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "uecb.fullname" . }}-config
{{- if .Values.config.github.auth.secretRef }}
        - name: github-app-secret
          secret:
            secretName: {{ .Values.config.github.auth.secretRef }}
{{- end }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
