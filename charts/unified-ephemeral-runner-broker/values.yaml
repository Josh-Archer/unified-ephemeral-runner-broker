nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/josh-archer/unified-ephemeral-runner-broker/broker
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080
  annotations: {}
  labels: {}

observability:
  prometheus:
    scrape: false
    path: /metrics

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

config:
  allowUnauthenticated: false
  github:
    auth:
      mode: github-app
      secretRef: uecb-github-app
    scope:
      type: organization
      organization: my-org
      runnerGroupPrefix: uecb
  broker:
    defaultPool: full
    defaultJobTimeout: 15m
    orphanCleanup:
      enabled: false
      quarantineTTL: 15m
    stateStore:
      type: memory
      path: ""
    queue:
      enabled: false
      retryAfter: 30s
      maxAttempts: 3
    api:
      oidcAudience: uecb-broker
    tierRouting:
      enabled: false
      refreshInterval: 5m
      staleAfter: 15m
      refreshOnStartup: true
      failureMode: pass-through-round-robin
      fallbackBackends:
        - arc
      prometheus:
        url: ""
        timeout: 2s
        secretRef: ""
      providers: {}
      providerRules: []
  pools:
    - name: full
      labels:
        - self-hosted
        - linux
        - x64
        - uecb
        - uecb-full
      # Backend schedulers: round-robin, weighted-round-robin, priority-fair-share
      scheduler: round-robin
      fairShare:
        enabled: false
        priorityClasses:
          normal: 1
          high: 2
      capabilityProfile: full
      backends:
        arc:
          enabled: true
          healthy: true
          maxRunners: 4
          weight: 1
          capabilities:
            - cluster-local
            - docker
            - region:local
          template: arc-full
    - name: lite
      labels:
        - self-hosted
        - linux
        - x64
        - uecb
        - uecb-lite
      # Backend schedulers: round-robin, weighted-round-robin, priority-fair-share
      scheduler: round-robin
      fairShare:
        enabled: false
        priorityClasses:
          normal: 1
          high: 2
      capabilityProfile: lite
      backends:
        arc:
          enabled: true
          healthy: true
          maxRunners: 2
          weight: 1
          capabilities:
            - cluster-local
            - docker
            - region:local
          template: arc-lite
        codebuild:
          enabled: false
          healthy: true
          maxRunners: 3
          # warmMin: 0
          # warmMax: 0
          # warmTTL: 15m
          # circuitBreaker:
          #   enabled: false
          #   failureThreshold: 3
          #   evaluationWindow: 5m
          #   openDuration: 2m
          #   probeInterval: 30s
          #   probeTimeout: 10s
          #   recoverySuccessThreshold: 1
          #   halfOpenMaxRequests: 1
          #   tripReasons:
          #     - timeout
          #     - transport-error
          #     - throttled
          #     - server-error
          #     - wait-timeout
          # rateLimit:
          #   enabled: false
          #   permits: 6
          #   interval: 1m
          #   burst: 1
          # tierRules:
          #   - name: codebuild-free-tier
          #     providerRef: aws-main
          #     usageQuery: uecb:backend_usage:ratio{backend="codebuild"}
          #     burnRateQuery: uecb:backend_usage_burn_rate{backend="codebuild"}
          #     softLimitRatio: 0.8
          #     hardLimitRatio: 0.95
          #     action: observe-only
          weight: 1
          maxJobDuration: 14m
          capabilities:
            - docker
            - region:aws-us-east-1
          secretRef: uecb-codebuild
        lambda:
          enabled: false
          healthy: true
          maxRunners: 3
          # warmMin: 0
          # warmMax: 0
          # warmTTL: 15m
          weight: 1
          maxJobDuration: 14m
          capabilities:
            - region:aws-us-east-1
          secretRef: uecb-lambda
        cloud-run:
          enabled: false
          healthy: true
          maxRunners: 2
          weight: 1
          maxJobDuration: 30m
          capabilities:
            - region:gcp-us-central1
          secretRef: uecb-cloud-run
        azure-functions:
          enabled: false
          healthy: true
          maxRunners: 2
          weight: 1
          maxJobDuration: 25m
          capabilities:
            - region:azure-eastus
          secretRef: uecb-azure-functions
        azure-vm:
          enabled: false
          healthy: true
          maxRunners: 1
          # circuitBreaker is useful for static VM labels that start timing out
          # while other backends remain available.
          # circuitBreaker:
          #   enabled: false
          #   failureThreshold: 1
          #   evaluationWindow: 5m
          #   openDuration: 2m
          #   probeInterval: 30s
          #   probeTimeout: 10s
          #   recoverySuccessThreshold: 1
          weight: 1
          maxJobDuration: 6h
          capabilities:
            - docker
            - privileged
            - vm
            - cloud:azure
            - region:azure-eastus
          runnerLabel: replace-with-private-azure-vm-runner-label
        ec2:
          enabled: false
          healthy: true
          maxRunners: 1
          weight: 1
          maxJobDuration: 6h
          capabilities:
            - docker
            - privileged
            - vm
            - cloud:aws
            - region:aws-us-east-1
          secretRef: uecb-ec2
        gce:
          enabled: false
          healthy: true
          maxRunners: 1
          weight: 1
          maxJobDuration: 6h
          capabilities:
            - docker
            - privileged
            - vm
            - cloud:gcp
            - region:gcp-us-central1
          secretRef: uecb-gce
