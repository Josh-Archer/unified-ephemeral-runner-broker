apiVersion: v1
kind: ConfigMap
metadata:
  name: unified-ephemeral-runner-broker-config
  namespace: arc-systems
data:
  broker.yaml: |
    github:
      auth:
        mode: github-app
        secretRef: uecb-github-app
      scope:
        type: organization
        organization: my-org
        runnerGroupPrefix: uecb
    broker:
      defaultPool: full
      defaultJobTimeout: 15m
      allowUnauthenticated: false
      api:
        oidcAudience: uecb-broker
    pools:
      - name: full
        labels: [self-hosted, linux, x64, uecb, uecb-full]
        scheduler: round-robin
        fairShare:
          enabled: false
          priorityClasses:
            normal: 1
            high: 2
        capabilityProfile: full
        backends:
          arc:
            enabled: true
            healthy: true
            maxRunners: 4
            weight: 1
            capabilities: [cluster-local, docker, region:local]
            template: arc-full
      - name: lite
        labels: [self-hosted, linux, x64, uecb, uecb-lite]
        scheduler: round-robin
        fairShare:
          enabled: false
          priorityClasses:
            normal: 1
            high: 2
        capabilityProfile: lite
        backends:
          arc:
            enabled: true
            healthy: true
            maxRunners: 2
            weight: 1
            capabilities: [cluster-local, docker, region:local]
            template: arc-lite
          codebuild:
            enabled: false
            healthy: true
            maxRunners: 3
            # warmMin: 0
            # warmMax: 0
            # warmTTL: 15m
            weight: 1
            maxJobDuration: 14m
            capabilities: [docker, region:aws-us-east-1]
            secretRef: uecb-codebuild
          lambda:
            enabled: false
            healthy: true
            maxRunners: 3
            weight: 1
            maxJobDuration: 14m
            capabilities: [region:aws-us-east-1]
            secretRef: uecb-lambda
          cloud-run:
            enabled: false
            healthy: true
            maxRunners: 2
            weight: 1
            maxJobDuration: 30m
            capabilities: [region:gcp-us-central1]
            secretRef: uecb-cloud-run
          azure-functions:
            enabled: false
            healthy: true
            maxRunners: 2
            weight: 1
            maxJobDuration: 25m
            capabilities: [region:azure-eastus]
            secretRef: uecb-azure-functions
          azure-vm:
            enabled: false
            healthy: true
            maxRunners: 1
            weight: 1
            maxJobDuration: 6h
            capabilities: [docker, privileged, vm, cloud:azure, region:azure-eastus]
            runnerLabel: az-vm-gha
          ec2:
            enabled: false
            healthy: true
            maxRunners: 1
            weight: 1
            maxJobDuration: 6h
            capabilities: [docker, privileged, vm, cloud:aws, region:aws-us-east-1]
            secretRef: uecb-ec2
          gce:
            enabled: false
            healthy: true
            maxRunners: 1
            weight: 1
            maxJobDuration: 6h
            capabilities: [docker, privileged, vm, cloud:gcp, region:gcp-us-central1]
            secretRef: uecb-gce
